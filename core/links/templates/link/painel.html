<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ frame.desc }} — Painel</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
    .painel-back {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 10000;
      padding: 0.45rem 0.75rem;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      color: #06294a;
      background: #f5c518;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    .painel-back:hover { filter: brightness(1.05); }
    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <a class="painel-back" href="{% url 'links:indexLinks' %}">← Meus painéis</a>
  <iframe src="{{ frame.link }}" title="{{ frame.desc }}" allowfullscreen></iframe>
</body>
</html>
